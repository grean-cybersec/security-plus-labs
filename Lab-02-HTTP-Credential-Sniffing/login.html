<!DOCTYPE html>
<html>
<head>
    <title>Corporate Login Portal</title>
    <style>
        body { font-family: Arial; background: #1a1a2e; 
               display: flex; justify-content: center; 
               align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 40px; 
                     border-radius: 8px; width: 300px; }
        h2 { color: #333; text-align: center; }
        input { width: 100%; padding: 10px; margin: 8px 0; 
                box-sizing: border-box; border: 1px solid #ddd; 
                border-radius: 4px; }
        button { width: 100%; padding: 10px; background: #e94560; 
                 color: white; border: none; border-radius: 4px; 
                 cursor: pointer; font-size: 16px; }
        .warning { color: red; font-size: 11px; text-align: center; 
                   margin-top: 10px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>🏢 CorpNet Portal</h2>
        <form action="/login" method="POST">
            <input type="text" name="username" 
                   placeholder="Username" required>
            <input type="password" name="password" 
                   placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <p class="warning">⚠️ HTTP - Not Secure</p>
    </div>
</body>
</html>
